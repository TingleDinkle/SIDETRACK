<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 560" width="480" height="560" role="img" aria-label="A little blue train in a cozy mine">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#7a512f"/>
      <stop offset="55%" stop-color="#3c2817"/>
      <stop offset="100%" stop-color="#1d1209"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2616"/>
      <stop offset="100%" stop-color="#221308"/>
    </linearGradient>
    <radialGradient id="lamp" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe6a8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffd98a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="loco" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a86bf"/>
      <stop offset="100%" stop-color="#34608f"/>
    </linearGradient>
  </defs>

  <!-- mine interior -->
  <rect width="480" height="560" fill="url(#glow)"/>
  <!-- tunnel arch shadow -->
  <path d="M40 560 V200 Q40 70 240 60 Q440 70 440 200 V560 Z" fill="none" stroke="#160f08" stroke-width="48" opacity="0.55"/>

  <!-- timber supports -->
  <g fill="#6b4a2c" stroke="#3f2a15" stroke-width="3">
    <rect x="34" y="150" width="36" height="410" rx="6"/>
    <rect x="410" y="150" width="36" height="410" rx="6"/>
    <rect x="42" y="118" width="396" height="42" rx="8"/>
  </g>
  <rect x="42" y="150" width="396" height="8" fill="#4f3620"/>

  <!-- hanging lantern + warm glow -->
  <circle cx="240" cy="185" r="130" fill="url(#lamp)"/>
  <line x1="240" y1="140" x2="240" y2="170" stroke="#2a1c10" stroke-width="4"/>
  <rect x="225" y="168" width="30" height="36" rx="6" fill="#3a2a16" stroke="#1f1408" stroke-width="2"/>
  <rect x="231" y="175" width="18" height="23" rx="3" fill="#ffd676"/>

  <!-- gems glinting in the rock -->
  <polygon points="92,300 106,316 92,340 78,316" fill="#5fe0cf" stroke="#2f9d8e" stroke-width="2"/>
  <polygon points="392,332 404,346 392,366 380,346" fill="#e98ad6" stroke="#a64f95" stroke-width="2"/>
  <polygon points="120,420 132,434 120,454 108,434" fill="#ffd24a" stroke="#c79a1e" stroke-width="2"/>

  <!-- ground -->
  <path d="M0 442 Q240 402 480 442 V560 H0 Z" fill="url(#ground)"/>

  <!-- rails + sleepers (perspective into the mine) -->
  <g stroke="#caa06f" stroke-width="9" stroke-linecap="round">
    <line x1="118" y1="542" x2="362" y2="542"/>
    <line x1="150" y1="506" x2="330" y2="506"/>
    <line x1="173" y1="478" x2="307" y2="478"/>
    <line x1="191" y1="456" x2="289" y2="456"/>
  </g>
  <g stroke="#d9dcea" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M108 554 L196 448"/>
    <path d="M372 554 L284 448"/>
  </g>

  <!-- wagon (behind, carrying gems) -->
  <g transform="translate(150 472)">
    <rect x="-6" y="-46" width="86" height="48" rx="8" fill="#cf8740" stroke="#8a571f" stroke-width="3"/>
    <rect x="2" y="-40" width="70" height="15" rx="4" fill="#a96a2c"/>
    <polygon points="14,-44 24,-56 36,-44" fill="#4a3a2a"/>
    <polygon points="40,-45 52,-59 64,-45" fill="#5fe0cf" stroke="#2f9d8e" stroke-width="1.5"/>
    <circle cx="16" cy="6" r="12" fill="#2a1c12" stroke="#0f0a06" stroke-width="3"/>
    <circle cx="58" cy="6" r="12" fill="#2a1c12" stroke="#0f0a06" stroke-width="3"/>
    <circle cx="16" cy="6" r="4" fill="#cf8740"/>
    <circle cx="58" cy="6" r="4" fill="#cf8740"/>
  </g>

  <!-- little blue loco -->
  <g transform="translate(250 460)">
    <circle cx="30" cy="-72" r="9" fill="#b9a48f" opacity="0.5"/>
    <circle cx="45" cy="-86" r="12" fill="#b9a48f" opacity="0.38"/>
    <circle cx="62" cy="-100" r="15" fill="#b9a48f" opacity="0.26"/>
    <rect x="0" y="-40" width="120" height="46" rx="12" fill="url(#loco)" stroke="#244a70" stroke-width="3"/>
    <rect x="-10" y="-34" width="22" height="36" rx="8" fill="#34608f" stroke="#244a70" stroke-width="3"/>
    <circle cx="0" cy="-16" r="9" fill="#cf8740" stroke="#8a571f" stroke-width="2"/>
    <rect x="22" y="-60" width="16" height="24" rx="3" fill="#2d5680" stroke="#1c3a59" stroke-width="2"/>
    <rect x="78" y="-66" width="46" height="34" rx="8" fill="#2d5680" stroke="#1c3a59" stroke-width="3"/>
    <rect x="86" y="-60" width="30" height="20" rx="4" fill="#ffd676"/>
    <circle cx="26" cy="8" r="16" fill="#2a1c12" stroke="#0f0a06" stroke-width="4"/>
    <circle cx="84" cy="8" r="16" fill="#2a1c12" stroke="#0f0a06" stroke-width="4"/>
    <circle cx="26" cy="8" r="5" fill="#cf5a4a"/>
    <circle cx="84" cy="8" r="5" fill="#cf5a4a"/>
    <circle cx="-8" cy="-16" r="6" fill="#ffe6a8"/>
  </g>
</svg>
